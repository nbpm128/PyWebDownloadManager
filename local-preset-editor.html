<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preset Config Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
      :root {
        --bg: #080a10; --surface: #0e1118; --surface-2: #141820; --surface-3: #1a1f2c; --surface-4: #1f2535;
        --border: rgba(255,255,255,.06); --border-soft: rgba(255,255,255,.035); --border-mid: rgba(255,255,255,.1);
        --text: #e8ecf4; --text-2: #8fa0b8; --text-3: #4a5670;
        --accent: #4f7eff; --accent-dim: rgba(79,126,255,.09); --accent-glow: rgba(79,126,255,.2);
        --green: #34d399; --green-dim: rgba(52,211,153,.08);
        --red: #f4637a; --red-dim: rgba(244,99,122,.08);
        --yellow: #f5bf4f; --yellow-dim: rgba(245,191,79,.08);
        --purple: #a78bfa; --purple-dim: rgba(167,139,250,.09);
        --orange: #f97316; --orange-dim: rgba(249,115,22,.08);
        --radius: 8px; --radius-sm: 5px; --ease: .15s ease;
        --font-ui: 'Inter', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      }
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body,#root{height:100%}
      body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:13.5px;line-height:1.6;overflow:hidden;-webkit-font-smoothing:antialiased}
      ::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface-4);border-radius:99px}
      .collapsible-wrapper{display:grid;grid-template-rows:0fr;transition:grid-template-rows .26s cubic-bezier(.4,0,.2,1);overflow:hidden}
      .collapsible-wrapper.open{grid-template-rows:1fr}
      .collapsible-inner{min-height:0;overflow:hidden}
      .app{display:flex;flex-direction:column;height:100vh}
      .header{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
      .header-title{font-size:14.5px;font-weight:700;letter-spacing:-.3px;flex:1}
      .header-title b{color:var(--accent);font-weight:800}
      .header-title small{font-family:var(--font-mono);font-size:10px;color:var(--text-3);font-weight:400;margin-left:8px}
      .body{display:flex;flex:1;overflow:hidden}
      .sidebar{width:270px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
      .sidebar-head{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;font-size:10.5px;font-weight:700;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;gap:6px}
      .sidebar-head-actions{margin-left:auto}
      .tree{flex:1;overflow-y:auto;padding:3px 0}
      .main{flex:1;overflow-y:auto;padding:24px 28px}
      .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);font-family:var(--font-ui);font-size:12.5px;font-weight:600;cursor:pointer;transition:all var(--ease);white-space:nowrap;line-height:1;outline:none;letter-spacing:-.1px}
      .btn:hover{background:var(--surface-3);color:var(--text);border-color:var(--border-mid)}
      .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn.primary:hover{background:#3b6ef0}
      .btn.success{background:var(--green);color:#021a0c;border-color:var(--green);font-weight:700}.btn.success:hover{background:#28c487}
      .btn.danger{background:transparent;color:var(--red);border-color:rgba(244,99,122,.25)}.btn.danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
      .btn.ghost{background:transparent}
      .btn.add{background:transparent;color:var(--green);border:1px dashed rgba(52,211,153,.35);font-size:11.5px;padding:4px 9px}.btn.add:hover{background:var(--green-dim);border-color:var(--green)}
      .btn.sm{padding:4px 9px;font-size:11.5px}
      .btn.orange{background:transparent;color:var(--orange);border-color:rgba(249,115,22,.25)}.btn.orange:hover{background:var(--orange);color:#fff;border-color:var(--orange)}
      .tree-node{display:flex;align-items:center;gap:6px;padding:6px 12px;cursor:pointer;border-left:2px solid transparent;color:var(--text-2);font-size:13px;transition:background var(--ease),color var(--ease);user-select:none;position:relative}
      .tree-node:hover{background:var(--surface-2);color:var(--text)}
      .tree-node.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent)}
      .tree-node.special{color:var(--yellow)}.tree-node.special:hover{background:var(--yellow-dim)}.tree-node.special.active{background:var(--yellow-dim);border-left-color:var(--yellow)}
      .tree-node.d0{font-weight:700}.tree-node.d1{padding-left:22px}.tree-node.d2{padding-left:36px;font-size:12.5px}.tree-node.d3{padding-left:50px;font-size:12px}.tree-node.d4{padding-left:64px;font-size:11.5px}
      .tn-arrow{font-size:7px;width:10px;text-align:center;color:var(--text-3);flex-shrink:0;transition:transform .18s cubic-bezier(.4,0,.2,1)}
      .tn-arrow.open{transform:rotate(90deg)}
      .tn-icon{font-size:12px;flex-shrink:0}.tn-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .tn-badge{font-size:10px;color:var(--text-3);background:var(--surface-3);padding:1px 5px;border-radius:3px;flex-shrink:0;font-family:var(--font-mono)}
      .tree-sep{height:1px;background:var(--border);margin:3px 10px}
      .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
      .card-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface-2);border-bottom:1px solid var(--border)}
      .card-title{flex:1;font-size:10.5px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em}
      .card-body{padding:16px}
      .field{display:flex;flex-direction:column;gap:5px}
      .field label{font-size:10.5px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em}
      .field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-family:var(--font-mono);font-size:12.5px;color:var(--text);outline:none;transition:border-color var(--ease),box-shadow var(--ease)}
      .field select{appearance:none;cursor:pointer}.field select option{background:var(--surface-2);color:var(--text)}
      .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
      .field input::placeholder,.field textarea::placeholder{color:var(--text-3);font-size:11.5px}
      .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.grid1{display:grid;grid-template-columns:1fr;gap:10px}
      .badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.02em}
      .badge.blue{background:var(--accent-dim);color:var(--accent)}.badge.green{background:var(--green-dim);color:var(--green)}.badge.purple{background:var(--purple-dim);color:var(--purple)}.badge.yellow{background:var(--yellow-dim);color:var(--yellow)}.badge.orange{background:var(--orange-dim);color:var(--orange)}.badge.red{background:var(--red-dim);color:var(--red)}
      .breadcrumb{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text-3);margin-bottom:18px;font-family:var(--font-mono);flex-wrap:wrap}
      .breadcrumb b{color:var(--text-2);font-weight:500}.breadcrumb-sep{color:var(--border)}
      .divider{display:flex;align-items:center;gap:8px;margin:14px 0 12px}
      .divider span{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
      .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
      .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:10px;color:var(--text-3);text-align:center}
      .empty .ico{font-size:38px;opacity:.2}.empty p{font-size:14px;font-weight:500}.empty small{font-size:12px}
      .sp-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);cursor:pointer;margin-bottom:6px;transition:border-color var(--ease),background var(--ease)}
      .sp-row:last-child{margin-bottom:0}.sp-row:hover{border-color:var(--accent);background:var(--accent-dim)}.sp-row:hover .sp-name{color:var(--accent)}
      .sp-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}.sp-id{font-size:11px;color:var(--text-3);font-family:var(--font-mono)}
      .dl-list{display:flex;flex-direction:column;gap:8px}
      .dl-card{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);overflow:hidden;transition:border-color var(--ease)}.dl-card:hover{border-color:rgba(79,126,255,.2)}
      .dl-card-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(79,126,255,.035);border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background var(--ease)}.dl-card-head:hover{background:rgba(79,126,255,.08)}
      .dl-fname{flex:1;font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .dl-fsize{font-size:10.5px;color:var(--text-3);font-family:var(--font-mono);flex-shrink:0}.dl-body{padding:14px}
      .mirror-row{display:grid;grid-template-columns:1fr 140px auto;gap:8px;align-items:flex-end;margin-bottom:8px}
      .auth-card{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden}
      .auth-card-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(249,115,22,.04);border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background var(--ease)}.auth-card-head:hover{background:rgba(249,115,22,.08)}
      .auth-card-name{flex:1;font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--orange)}.auth-card-body{padding:12px}
      .kv-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:flex-end;margin-bottom:6px}
      .tag-container{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;display:flex;flex-wrap:wrap;gap:5px;min-height:38px}
      .tag-pill{display:inline-flex;align-items:center;gap:4px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(79,126,255,.25);border-radius:4px;padding:2px 7px;font-size:11px;font-family:var(--font-mono)}
      .tag-pill.purple{background:var(--purple-dim);color:var(--purple);border-color:rgba(167,139,250,.25)}
      .tag-remove{cursor:pointer;color:var(--text-3);font-size:13px;line-height:1;transition:color var(--ease);background:none;border:none;padding:0}.tag-remove:hover{color:var(--red)}
      .tag-input-row{display:flex;gap:8px;margin-top:8px}
      .tag-input-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:6px 9px;border-radius:var(--radius-sm);outline:none}.tag-input-row input:focus{border-color:var(--accent)}
      .extract-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-top:10px}
      .extract-head{font-size:10.5px;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
      .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      .toast{position:fixed;bottom:16px;right:16px;padding:9px 15px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:700;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;z-index:9999;font-family:var(--font-ui)}
      .toast.show{opacity:1;transform:translateY(0)}
      .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center}.modal-backdrop.show{display:flex}
      .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:90vw;max-width:860px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
      .modal-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px}.modal-head span{flex:1}
      .modal-body{flex:1;overflow:auto;padding:14px}
      .modal-body textarea{width:100%;min-height:400px;background:var(--bg);border:1px solid var(--border);color:var(--text-2);font-family:var(--font-mono);font-size:11.5px;padding:12px;border-radius:var(--radius-sm);outline:none;resize:none;line-height:1.7}
      .transfer-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:92vw;max-width:720px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
      .transfer-section{padding:12px 14px;border-bottom:1px solid var(--border)}
      .transfer-section h3{font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
      .transfer-preset-list{display:flex;flex-direction:column;gap:4px;max-height:150px;overflow-y:auto}
      .tpt-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);cursor:pointer;font-size:12.5px;transition:all var(--ease)}
      .tpt-item:hover,.tpt-item.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
      .transfer-items-area{padding:12px 14px;flex:1;overflow-y:auto}
      .transfer-items-area h3{font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
      .ti-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);margin-bottom:4px}
      .ti-row input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;cursor:pointer;flex-shrink:0}
      .ti-label{flex:1;font-size:12px;font-family:var(--font-mono);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .ti-type{font-size:10px;color:var(--text-3);background:var(--surface-3);padding:1px 5px;border-radius:3px;flex-shrink:0}
      .tg-header{display:flex;align-items:center;gap:8px;margin:8px 0 5px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em}.tg-header::after{content:'';flex:1;height:1px;background:var(--border)}
      .tg-select-all{background:none;border:none;color:var(--accent);font-size:10.5px;font-family:var(--font-ui);cursor:pointer;padding:0}.tg-select-all:hover{text-decoration:underline}
      .transfer-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
      .transfer-footer .sel-info{flex:1;font-size:11.5px;color:var(--text-3)}
      .import-url-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:90vw;max-width:560px;display:flex;flex-direction:column;overflow:hidden}
      .import-url-body{padding:18px;display:flex;flex-direction:column;gap:12px}
      .import-url-status{font-size:12px;font-family:var(--font-mono);padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text-3);min-height:36px;word-break:break-all;line-height:1.5}
      .import-url-status.ok{color:var(--green);border-color:rgba(52,211,153,.3);background:var(--green-dim)}
      .import-url-status.err{color:var(--red);border-color:rgba(244,99,122,.3);background:var(--red-dim)}
      .import-url-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;max-height:220px;overflow-y:auto}
      .import-url-item{display:flex;align-items:center;gap:8px;padding:5px 7px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);margin-bottom:5px;font-size:12px;cursor:pointer;transition:border-color var(--ease)}
      .import-url-item:hover,.import-url-item.selected{border-color:var(--accent);background:var(--accent-dim)}
      .import-url-item input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0}
      .import-url-item-name{flex:1;font-family:var(--font-mono);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .import-url-item-size{font-size:10.5px;color:var(--text-3);flex-shrink:0}
      .import-url-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
      .import-url-footer .sel-info{flex:1;font-size:11.5px;color:var(--text-3)}
      .iurl-card{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden}
      .iurl-card-head{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(79,126,255,.04);border-bottom:1px solid var(--border-soft);cursor:pointer}
      .iurl-card-head:hover{background:rgba(79,126,255,.09)}
      .iurl-card-fname{flex:1;font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .iurl-card-body{padding:10px;display:flex;flex-direction:column;gap:8px}
      .iurl-field{display:flex;flex-direction:column;gap:3px}
      .iurl-field label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em}
      .iurl-field input{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;font-family:var(--font-mono);font-size:11.5px;color:var(--text);outline:none}
      .iurl-field input:focus{border-color:var(--accent)}
      .iurl-mirror-row{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center}
      .iurl-mirror-url{font-family:var(--font-mono);font-size:11px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:4px 7px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm)}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useRef, useCallback, useEffect } = React;
      const uid = () => Math.random().toString(36).slice(2,6).toUpperCase();
      const fmtBytes = b => { if(!b&&b!==0)return''; if(b>=1e9)return(b/1e9).toFixed(2)+' GB'; if(b>=1e6)return(b/1e6).toFixed(1)+' MB'; if(b>0)return Math.round(b/1e3)+' KB'; return'0'; };
      const deepClone = o => JSON.parse(JSON.stringify(o));
      const pstr = p => JSON.stringify(p);

      function getNodeFromData(data, path) {
        let cur = data;
        for(const k of path){ if(cur===undefined||cur===null) throw new Error('Bad path at key='+k); cur=cur[k]; }
        return cur;
      }
      function cleanNode(obj) {
        if(Array.isArray(obj)) return obj.map(cleanNode);
        if(typeof obj!=='object'||obj===null) return obj;
        const out={};
        for(const k of Object.keys(obj)){ const v=obj[k]; if(k==='id'){out[k]=v;continue} if(v===''||v===null||v===undefined)continue; if(Array.isArray(v)){if(v.length>0)out[k]=cleanNode(v);continue} if(typeof v==='object'){const c=cleanNode(v);if(Object.keys(c).length>0)out[k]=c;continue} out[k]=v; }
        return out;
      }

      function Collapsible({ open, children }) {
        return <div className={`collapsible-wrapper${open?' open':''}`}><div className="collapsible-inner">{children}</div></div>;
      }

      function useToast() {
        const [toast, setToast] = useState({msg:'',ok:true,show:false});
        const timerRef = useRef();
        const show = useCallback((msg,ok=true)=>{ clearTimeout(timerRef.current); setToast({msg,ok,show:true}); timerRef.current=setTimeout(()=>setToast(t=>({...t,show:false})),2200); },[]);
        return [toast, show];
      }

      function App() {
        const [data, setData] = useState({authConfigs:{},presets:[],metadata:{}});
        const [sel, setSel] = useState(null);
        const [expanded, setExpanded] = useState({});
        const [rawModal, setRawModal] = useState(false);
        const [rawText, setRawText] = useState('');
        const [transferModal, setTransferModal] = useState(null);
        const [toast, showToast] = useToast();
        const fileRef = useRef();

        const navigate = useCallback((path) => {
          if(typeof path==='object'&&path!==null){ const exps={}; for(let i=2;i<=path.length;i+=2) exps[pstr(path.slice(0,i))]=true; setExpanded(prev=>({...prev,...exps})); }
          setSel(path);
        },[]);
        const toggleExpand = useCallback((path)=>{ const k=pstr(path); setExpanded(prev=>({...prev,[k]:!prev[k]})); },[]);
        const updateData = useCallback((updater)=>{ setData(prev=>{ const next=deepClone(prev); updater(next); return next; }); },[]);

        const handleImport = e => {
          const file=e.target.files[0]; if(!file)return;
          const r=new FileReader();
          r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(!d.authConfigs)d.authConfigs={}; if(!d.presets)d.presets=[]; if(!d.metadata)d.metadata={}; setData(d);setSel(null);setExpanded({});showToast('Imported!'); }catch(ex){showToast('JSON error: '+ex.message,false);} };
          r.readAsText(file); e.target.value='';
        };
        const handleExport = () => { const clean=cleanNode(data); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(clean,null,2)],{type:'application/json'})); a.download='presets.json'; a.click(); showToast('Exported!'); };
        const openRaw = () => { setRawText(JSON.stringify(cleanNode(data),null,2)); setRawModal(true); };
        const applyRaw = () => { try{ const d=JSON.parse(rawText); if(!d.authConfigs)d.authConfigs={}; if(!d.presets)d.presets=[]; if(!d.metadata)d.metadata={}; setData(d);setSel(null);setRawModal(false);showToast('Applied!'); }catch(e){showToast('JSON error',false);} };

        return (
          <div className="app">
            <header className="header">
              <div className="header-title">Preset <b>Config</b> Editor<small>v{data.version||'1.0'}</small></div>
              <button className="btn ghost sm" onClick={()=>fileRef.current.click()}>⬆ Import</button>
              <button className="btn ghost sm" onClick={openRaw}>{'{ }'} Raw</button>
              <button className="btn success sm" onClick={handleExport}>⬇ Export</button>
              <input type="file" accept=".json" ref={fileRef} style={{display:'none'}} onChange={handleImport} />
            </header>
            <div className="body">
              <aside className="sidebar">
                <div className="sidebar-head">
                  <span>Presets</span>
                  <div className="sidebar-head-actions">
                    <button className="btn add" onClick={()=>{ updateData(d=>{ if(!d.presets)d.presets=[]; d.presets.push({id:'PRESET_'+uid(),name:'New Preset',presets:[]}); }); showToast('Preset added'); }}>+ Preset</button>
                  </div>
                </div>
                <div className="tree">
                  <SpecialNode label="🔑 Auth Configs" id="auth" sel={sel} onSelect={()=>navigate('auth')} />
                  <SpecialNode label="📋 Metadata" id="meta" sel={sel} onSelect={()=>navigate('meta')} />
                  <div className="tree-sep" />
                  <TreeLevel arr={data.presets||[]} path={['presets']} depth={0} sel={sel} expanded={expanded} onNavigate={navigate} onToggle={toggleExpand} onDeselect={()=>setSel(null)} />
                </div>
              </aside>
              <main className="main">
                {sel===null && <div className="empty"><div className="ico">⚙</div><p>Select an item in the tree on the left</p><small>or import a JSON file</small></div>}
                {sel==='auth' && <AuthPanel data={data} updateData={updateData} showToast={showToast} />}
                {sel==='meta' && <MetaPanel data={data} updateData={updateData} />}
                {sel!==null&&sel!=='auth'&&sel!=='meta' && (
                  <PresetPanel data={data} sel={sel} updateData={updateData} onNavigate={navigate} showToast={showToast}
                    onOpenTransfer={type=>setTransferModal({type,srcPath:sel})}
                    onDelete={()=>{ updateData(d=>{ const parentPath=sel.slice(0,-2); const arrKey=sel[sel.length-2]; const idx=sel[sel.length-1]; const parent=parentPath.length?getNodeFromData(d,parentPath):d; parent[arrKey].splice(idx,1); }); setSel(null); showToast('Deleted',false); }}
                  />
                )}
              </main>
            </div>
            <div className={'toast'+(toast.show?' show':'')} style={{background:toast.ok?'var(--green)':'var(--red)',color:toast.ok?'#021a0c':'#fff'}}>{toast.msg}</div>
            <div className={'modal-backdrop'+(rawModal?' show':'')} onClick={e=>{if(e.target===e.currentTarget)setRawModal(false);}}>
              <div className="modal">
                <div className="modal-head"><span>Raw JSON</span><button className="btn ghost sm" onClick={()=>{navigator.clipboard.writeText(rawText);showToast('Copied!');}}>⎘ Copy</button><button className="btn primary sm" onClick={applyRaw}>Apply</button><button className="btn ghost sm" onClick={()=>setRawModal(false)}>✕</button></div>
                <div className="modal-body"><textarea spellCheck="false" value={rawText} onChange={e=>setRawText(e.target.value)} /></div>
              </div>
            </div>
            {transferModal && <TransferModal data={data} type={transferModal.type} srcPath={transferModal.srcPath} updateData={updateData} showToast={showToast} onClose={()=>setTransferModal(null)} />}
          </div>
        );
      }

      function SpecialNode({ label, id, sel, onSelect }) {
        return <div className={`tree-node d0 special${sel===id?' active':''}`} onClick={onSelect}><span className="tn-arrow"/><span className="tn-label">{label}</span></div>;
      }

      // ── KEY FIX: clicking an open+selected node collapses it and deselects ──
      function TreeLevel({ arr, path, depth, sel, expanded, onNavigate, onToggle, onDeselect }) {
        return arr.map((node, i) => {
          const npath = path.concat([i]);
          const hasKids = (node.presets||[]).length > 0;
          const cnt = (node.downloads||[]).length + (node.presets||[]).length || null;
          const icon = depth===0?'📁':depth===1?'📄':depth===2?'⚙':'◦';
          const isExp = !!expanded[pstr(npath)];
          const isSel = pstr(sel)===pstr(npath);
          const d = Math.min(depth, 4);

          const handleClick = () => {
            if (isSel && hasKids) {
              // Re-clicking the selected node: toggle expand.
              // If it was open → close it and clear selection.
              // If it was closed → open it (keep selected).
              onToggle(npath);
              if (isExp) onDeselect();
            } else {
              if (hasKids) onToggle(npath);
              onNavigate(npath);
            }
          };

          return (
            <React.Fragment key={i}>
              <div className={`tree-node d${d}${isSel?' active':''}`} onClick={handleClick}>
                <span className={`tn-arrow${hasKids&&isExp?' open':''}`}>{hasKids?'▶':''}</span>
                <span className="tn-icon">{icon}</span>
                <span className="tn-label">{node.name||node.id||'—'}</span>
                {cnt?<span className="tn-badge">{cnt}</span>:null}
              </div>
              <Collapsible open={isExp&&hasKids}>
                <TreeLevel arr={node.presets||[]} path={npath.concat(['presets'])} depth={depth+1} sel={sel} expanded={expanded} onNavigate={onNavigate} onToggle={onToggle} onDeselect={onDeselect} />
              </Collapsible>
            </React.Fragment>
          );
        });
      }

      function AuthPanel({ data, updateData, showToast }) {
        const [openCards, setOpenCards] = useState({});
        const ac = data.authConfigs||{}; const keys = Object.keys(ac);
        const toggleCard = k => setOpenCards(prev=>({...prev,[k]:!prev[k]}));
        return (
          <div>
            <div className="breadcrumb">root <span className="breadcrumb-sep">/</span> <b>authConfigs</b></div>
            <div className="card">
              <div className="card-head"><span className="card-title">🔑 Auth Configs</span><span className="badge orange" style={{marginRight:4}}>{keys.length}</span>
                <button className="btn add" onClick={()=>{ const name='auth_'+uid().toLowerCase(); updateData(d=>{d.authConfigs[name]={headers:{},cookies:{}};}); setOpenCards(prev=>({...prev,[name]:true})); showToast('Auth config added'); }}>+ Auth</button>
              </div>
              <div className="card-body">
                {!keys.length&&<div style={{color:'var(--text-3)',fontSize:12.5}}>No auth configurations</div>}
                {keys.map(key=><AuthCard key={key} cfgKey={key} cfg={ac[key]} open={!!openCards[key]} onToggle={()=>toggleCard(key)} updateData={updateData} showToast={showToast} />)}
              </div>
            </div>
          </div>
        );
      }

      function AuthCard({ cfgKey, cfg, open, onToggle, updateData, showToast }) {
        const headers=cfg.headers||{}; const cookies=cfg.cookies||{};
        const hkeys=Object.keys(headers); const ckeys=Object.keys(cookies);
        return (
          <div className="auth-card">
            <div className="auth-card-head" onClick={onToggle}>
              <span style={{fontSize:14}}>🔑</span><span className="auth-card-name">{cfgKey}</span>
              {hkeys.length>0&&<span className="badge blue">{hkeys.length} headers</span>}
              {ckeys.length>0&&<span className="badge yellow">{ckeys.length} cookies</span>}
              <button className="btn danger sm" onClick={e=>{e.stopPropagation();if(!confirm(`Delete auth config "${cfgKey}"?`))return;updateData(d=>{delete d.authConfigs[cfgKey];});showToast('Deleted',false);}}>✕</button>
            </div>
            <Collapsible open={open}>
              <div className="auth-card-body">
                <div className="grid1" style={{marginBottom:12}}><div className="field"><label>Config Name (Key)</label><input defaultValue={cfgKey} onBlur={e=>{const nk=e.target.value.trim();if(!nk||nk===cfgKey)return;updateData(d=>{if(d.authConfigs[nk])return;d.authConfigs[nk]=d.authConfigs[cfgKey];delete d.authConfigs[cfgKey];});}} /></div></div>
                <div className="divider"><span>Headers</span><button className="btn add sm" onClick={()=>updateData(d=>{if(!d.authConfigs[cfgKey].headers)d.authConfigs[cfgKey].headers={};d.authConfigs[cfgKey].headers['key_'+uid().toLowerCase()]='';})}>+ Header</button></div>
                {hkeys.map(k=><KVRow key={k} sectionKey={k} value={headers[k]} onChangeKey={nk=>updateData(d=>{const v=d.authConfigs[cfgKey].headers[k];delete d.authConfigs[cfgKey].headers[k];d.authConfigs[cfgKey].headers[nk]=v;})} onChangeVal={v=>updateData(d=>{d.authConfigs[cfgKey].headers[k]=v;})} onRemove={()=>updateData(d=>{delete d.authConfigs[cfgKey].headers[k];})} />)}
                <div className="divider"><span>Cookies</span><button className="btn add sm" onClick={()=>updateData(d=>{if(!d.authConfigs[cfgKey].cookies)d.authConfigs[cfgKey].cookies={};d.authConfigs[cfgKey].cookies['ck_'+uid().toLowerCase()]='';})}>+ Cookie</button></div>
                {ckeys.map(k=><KVRow key={k} sectionKey={k} value={cookies[k]} onChangeKey={nk=>updateData(d=>{const v=d.authConfigs[cfgKey].cookies[k];delete d.authConfigs[cfgKey].cookies[k];d.authConfigs[cfgKey].cookies[nk]=v;})} onChangeVal={v=>updateData(d=>{d.authConfigs[cfgKey].cookies[k]=v;})} onRemove={()=>updateData(d=>{delete d.authConfigs[cfgKey].cookies[k];})} />)}
              </div>
            </Collapsible>
          </div>
        );
      }

      function KVRow({ sectionKey, value, onChangeKey, onChangeVal, onRemove }) {
        return <div className="kv-row"><div className="field"><label>Key</label><input defaultValue={sectionKey} onBlur={e=>{const nk=e.target.value.trim();if(nk&&nk!==sectionKey)onChangeKey(nk);}} /></div><div className="field"><label>Value</label><input defaultValue={value} onBlur={e=>onChangeVal(e.target.value)} /></div><button className="btn danger sm" style={{alignSelf:'flex-end'}} onClick={onRemove}>✕</button></div>;
      }

      function MetaPanel({ data, updateData }) {
        const m=data.metadata||{};
        const upd=(f,v)=>updateData(d=>{if(!d.metadata)d.metadata={};if(v==='')delete d.metadata[f];else d.metadata[f]=v;});
        return (
          <div>
            <div className="breadcrumb">root <span className="breadcrumb-sep">/</span> <b>metadata</b></div>
            <div className="card"><div className="card-head"><span className="card-title">📋 Metadata</span></div>
              <div className="card-body"><div className="meta-grid">
                {[['version','1.0.0'],['author','author name'],['created','2026-01-01T00:00:00Z'],['notes','optional notes']].map(([f,ph])=>(
                  <div key={f} className="field"><label>{f.charAt(0).toUpperCase()+f.slice(1)}</label><input defaultValue={m[f]||''} placeholder={ph} onBlur={e=>upd(f,e.target.value)} /></div>
                ))}
              </div></div>
            </div>
          </div>
        );
      }

      function PresetPanel({ data, sel, updateData, onNavigate, showToast, onOpenTransfer, onDelete }) {
        const [importUrlOpen, setImportUrlOpen] = useState(false);
        let node; try{node=getNodeFromData(data,sel);}catch(e){return<div className="empty"><div className="ico">⚠</div><p>Error: {e.message}</p></div>;}
        if(!node||typeof node!=='object') return<div className="empty"><div className="ico">⚠</div><p>Node not found</p></div>;
        const subs=node.presets||[]; const dls=node.downloads||[];
        const upd=(f,v)=>updateData(d=>{getNodeFromData(d,sel)[f]=v;});
        const bcParts=[]; let cum=[];
        for(let i=0;i<sel.length;i++){ cum=cum.concat([sel[i]]); try{const cn=getNodeFromData(data,cum);if(cn&&typeof cn==='object'&&(cn.name||cn.id))bcParts.push(cn.name||cn.id);}catch(e2){} }
        const handleImportDownloads = (items) => {
          updateData(d=>{
            const n=getNodeFromData(d,sel);
            if(!n.downloads)n.downloads=[];
            items.forEach(item=>n.downloads.push(item));
          });
        };
        return (
          <div>
            <div className="breadcrumb">root{bcParts.map((b,i)=><React.Fragment key={i}><span className="breadcrumb-sep">/</span><b>{b}</b></React.Fragment>)}</div>
            <div className="card">
              <div className="card-head"><span className="card-title">Info</span><button className="btn danger sm" onClick={onDelete}>✕ Delete</button></div>
              <div className="card-body">
                {[['id','unique identifier',true],['name','display name',false],['description','short description',false]].map(([f,ph])=>(
                  <div key={f} className="grid1" style={{marginBottom:10}}><div className="field">
                    <label>{f==='id'?<>ID <span style={{color:'var(--red)',fontSize:9}}>*required</span></>:f.charAt(0).toUpperCase()+f.slice(1)}</label>
                    <input defaultValue={node[f]||''} placeholder={ph} key={pstr(sel)+f+node[f]} onBlur={e=>upd(f,e.target.value)} />
                  </div></div>
                ))}
              </div>
            </div>
            <div className="card">
              <div className="card-head"><span className="card-title">Nested Presets</span><span className="badge purple" style={{marginRight:4}}>{subs.length}</span>
                {subs.length>0&&<button className="btn ghost sm" onClick={()=>onOpenTransfer('presets')} style={{marginRight:4}}>⇄ Transfer</button>}
                <button className="btn add" onClick={()=>{updateData(d=>{const n=getNodeFromData(d,sel);if(!n.presets)n.presets=[];n.presets.push({id:'PRESET_'+uid(),name:'New Preset',downloads:[]});});showToast('Preset added');}}>+ Preset</button>
              </div>
              <div className="card-body">
                {!subs.length&&<div style={{color:'var(--text-3)',fontSize:12.5}}>No nested presets</div>}
                {subs.map((sub,i)=><div key={i} className="sp-row" onClick={()=>onNavigate(sel.concat(['presets',i]))}><span className="sp-name">{sub.name||sub.id||'Unnamed'}</span><span className="sp-id">{sub.id||''}</span><span className="badge blue">{(sub.downloads||[]).length} files</span>{(sub.presets||[]).length>0&&<span className="badge purple">{sub.presets.length} sub</span>}</div>)}
              </div>
            </div>
              <div className="card">
              <div className="card-head"><span className="card-title">Downloads</span><span className="badge green" style={{marginRight:4}}>{dls.length}</span>
                {dls.length>0&&<button className="btn ghost sm" onClick={()=>onOpenTransfer('downloads')} style={{marginRight:4}}>⇄ Transfer</button>}
                <button className="btn ghost sm" style={{marginRight:4,color:'var(--accent)',borderColor:'rgba(79,126,255,.3)'}} onClick={()=>setImportUrlOpen(true)}>⬇ URL</button>
                <button className="btn add" onClick={()=>{updateData(d=>{const n=getNodeFromData(d,sel);if(!n.downloads)n.downloads=[];n.downloads.push({id:'new_'+uid()+'.safetensors',mirrors:[]});});showToast('File added');}}>+ File</button>
              </div>
              <div className="card-body"><div className="dl-list">{dls.map((dl,di)=><DownloadCard key={di} dl={dl} di={di} authConfigs={data.authConfigs||{}} updateData={updateData} sel={sel} showToast={showToast} />)}</div></div>
            </div>
            {importUrlOpen && <ImportFromUrlModal onClose={()=>setImportUrlOpen(false)} onImport={handleImportDownloads} showToast={showToast} authConfigs={data.authConfigs||{}} />}
            <TagsSection title="Preset IDs" items={node.preset_ids} badgeClass="purple" pillClass="purple"
              onToggle={()=>updateData(d=>{const n=getNodeFromData(d,sel);if(n.preset_ids!==undefined)delete n.preset_ids;else n.preset_ids=[];})}
              onAdd={val=>updateData(d=>{const n=getNodeFromData(d,sel);if(!n.preset_ids)n.preset_ids=[];n.preset_ids.push(val);})}
              onRemove={i=>updateData(d=>{getNodeFromData(d,sel).preset_ids.splice(i,1);})}
              inputId="PID_IN" onTransfer={node.preset_ids&&node.preset_ids.length>0?()=>onOpenTransfer('preset_ids'):null}
            />
            <TagsSection title="Download IDs" items={node.download_ids} badgeClass="blue" pillClass=""
              onToggle={()=>updateData(d=>{const n=getNodeFromData(d,sel);if(n.download_ids!==undefined)delete n.download_ids;else n.download_ids=[];})}
              onAdd={val=>updateData(d=>{const n=getNodeFromData(d,sel);if(!n.download_ids)n.download_ids=[];n.download_ids.push(val);})}
              onRemove={i=>updateData(d=>{getNodeFromData(d,sel).download_ids.splice(i,1);})}
              inputId="TAG_IN" onTransfer={node.download_ids&&node.download_ids.length>0?()=>onOpenTransfer('download_ids'):null}
            />
          </div>
        );
      }

      function TagsSection({ title, items, badgeClass, pillClass, onToggle, onAdd, onRemove, inputId, onTransfer }) {
        const [input, setInput] = useState('');
        const doAdd = () => { const v=input.trim(); if(!v)return; onAdd(v); setInput(''); };
        return (
          <div className="card">
            <div className="card-head"><span className="card-title">{title}</span>
              {items!==undefined&&<span className={`badge ${badgeClass}`} style={{marginRight:4}}>{items.length}</span>}
              {onTransfer&&<button className="btn ghost sm" onClick={onTransfer} style={{marginRight:4}}>⇄ Transfer</button>}
              <button className="btn ghost sm" onClick={onToggle}>{items!==undefined?'Remove field':'Add field'}</button>
            </div>
            <Collapsible open={items!==undefined}>
              <div className="card-body">
                <div className="tag-container">{(items||[]).map((id,i)=><span key={i} className={`tag-pill ${pillClass}`}>{id}<button className="tag-remove" onClick={()=>onRemove(i)}>×</button></span>)}</div>
                <div className="tag-input-row"><input id={inputId} value={input} onChange={e=>setInput(e.target.value)} placeholder="ID → Enter" onKeyDown={e=>{if(e.key==='Enter')doAdd();}} /><button className="btn ghost sm" onClick={doAdd}>+ Add</button></div>
              </div>
            </Collapsible>
          </div>
        );
      }

      function DownloadCard({ dl, di, authConfigs, updateData, sel, showToast }) {
        const [open, setOpen] = useState(false);
        const upd=(f,v)=>updateData(d=>{const n=getNodeFromData(d,sel);if((v===''||v===undefined)&&f!=='id')delete n.downloads[di][f];else n.downloads[di][f]=v;});
        return (
          <div className="dl-card">
            <div className="dl-card-head" onClick={()=>setOpen(o=>!o)}>
              <span style={{fontSize:13}}>📦</span><span className="dl-fname">{dl.file_name||dl.id||'unnamed'}</span>
              {dl.file_size&&<span className="dl-fsize">{fmtBytes(dl.file_size)}</span>}
              <button className="btn danger sm" onClick={e=>{e.stopPropagation();if(!confirm('Delete file?'))return;updateData(d=>{getNodeFromData(d,sel).downloads.splice(di,1);});showToast('Deleted',false);}}>✕</button>
            </div>
            <Collapsible open={open}>
              <div className="dl-body">
                <div className="grid1" style={{marginBottom:10}}><div className="field"><label>ID <span style={{color:'var(--red)',fontSize:9}}>*required</span></label><input key={`id-${di}-${dl.id}`} defaultValue={dl.id||''} onBlur={e=>upd('id',e.target.value)} placeholder="unique file ID" /></div></div>
                <div className="grid1" style={{marginBottom:10}}><div className="field"><label>File Name</label><input key={`fn-${di}-${dl.file_name}`} defaultValue={dl.file_name||''} onBlur={e=>upd('file_name',e.target.value)} placeholder="filename.safetensors" /></div></div>
                <div className="grid1" style={{marginBottom:10}}><div className="field"><label>Folder Path</label><input key={`fp-${di}-${dl.folder_path}`} defaultValue={dl.folder_path||''} onBlur={e=>upd('folder_path',e.target.value)} placeholder="/workspace/ComfyUI/models/" /></div></div>
                <div className="grid2" style={{marginBottom:10}}>
                  <div className="field"><label>File Size (bytes)</label><input type="number" key={`fs-${di}`} defaultValue={dl.file_size||''} onBlur={e=>{updateData(d=>{const n=getNodeFromData(d,sel);if(!e.target.value)delete n.downloads[di].file_size;else n.downloads[di].file_size=+e.target.value;});}} placeholder="optional" /></div>
                  <div className="field"><label>Hash Algorithm</label><select value={dl.hash_algorithm||''} onChange={e=>{updateData(d=>{const n=getNodeFromData(d,sel);if(!e.target.value)delete n.downloads[di].hash_algorithm;else n.downloads[di].hash_algorithm=e.target.value;});}}>
                    <option value="">— None —</option>{['sha256','sha1','md5'].map(h=><option key={h} value={h}>{h}</option>)}</select></div>
                </div>
                <div className="grid1" style={{marginBottom:10}}><div className="field"><label>Checksum</label><input key={`cs-${di}`} defaultValue={dl.checksum||''} onBlur={e=>upd('checksum',e.target.value)} placeholder="hash value (optional)" style={{fontFamily:'var(--font-mono)',fontSize:11.5}} /></div></div>
                <div className="divider"><span>Mirrors</span></div>
                {(dl.mirrors||[]).map((m,mi)=><MirrorRow key={mi} mirror={m} di={di} mi={mi} authConfigs={authConfigs} updateData={updateData} sel={sel} />)}
                <button className="btn add sm" style={{marginTop:6}} onClick={()=>updateData(d=>{const n=getNodeFromData(d,sel);if(!n.downloads[di].mirrors)n.downloads[di].mirrors=[];n.downloads[di].mirrors.push({url:''});})}>+ Mirror</button>
                <div className="divider"><span>Extract</span>
                  <button className="btn ghost sm" style={{marginLeft:8}} onClick={()=>updateData(d=>{const n=getNodeFromData(d,sel).downloads[di];if(n.extract!==undefined)delete n.extract;else n.extract={format:'zip',destination:'',remove_archive:false};})}>{dl.extract!==undefined?'Remove':'Add'}</button>
                </div>
                <Collapsible open={dl.extract!==undefined}>
                  <div className="extract-card">
                    <div className="extract-head">📦 Extract Settings</div>
                    <div className="grid2" style={{marginBottom:10}}>
                      <div className="field"><label>Format</label><select value={dl.extract?dl.extract.format||'zip':'zip'} onChange={e=>updateData(d=>{getNodeFromData(d,sel).downloads[di].extract.format=e.target.value;})}>{['zip','tar','tar.gz','tar.bz2','rar','7z'].map(f=><option key={f} value={f}>{f}</option>)}</select></div>
                      <div className="field"><label>Destination</label><input key={`ex-dst-${di}`} defaultValue={dl.extract?dl.extract.destination||'':''} onBlur={e=>updateData(d=>{getNodeFromData(d,sel).downloads[di].extract.destination=e.target.value;})} placeholder="/path/to/folder" /></div>
                    </div>
                    <div className="grid2">
                      <div className="field"><label>Password</label><input key={`ex-pw-${di}`} defaultValue={dl.extract?dl.extract.password||'':''} onBlur={e=>updateData(d=>{getNodeFromData(d,sel).downloads[di].extract.password=e.target.value;})} placeholder="optional" /></div>
                      <div className="field"><label>Remove Archive</label><select value={dl.extract?(dl.extract.remove_archive?'true':'false'):'false'} onChange={e=>updateData(d=>{getNodeFromData(d,sel).downloads[di].extract.remove_archive=e.target.value==='true';})}><option value="false">false</option><option value="true">true</option></select></div>
                    </div>
                  </div>
                </Collapsible>
              </div>
            </Collapsible>
          </div>
        );
      }

      function MirrorRow({ mirror, di, mi, authConfigs, updateData, sel }) {
        const authKeys=Object.keys(authConfigs);
        return <div className="mirror-row"><div className="field"><label>URL</label><input key={`mir-url-${di}-${mi}`} defaultValue={mirror.url||''} onBlur={e=>updateData(d=>{getNodeFromData(d,sel).downloads[di].mirrors[mi].url=e.target.value;})} placeholder="https://…" /></div><div className="field"><label>Auth</label><select value={mirror.auth||''} onChange={e=>updateData(d=>{const m=getNodeFromData(d,sel).downloads[di].mirrors[mi];if(!e.target.value)delete m.auth;else m.auth=e.target.value;})}><option value="">— None —</option>{authKeys.map(k=><option key={k} value={k}>{k}</option>)}</select></div><button className="btn danger sm" style={{alignSelf:'flex-end'}} onClick={()=>updateData(d=>{getNodeFromData(d,sel).downloads[di].mirrors.splice(mi,1);})}>✕</button></div>;
      }

      function ImportFromUrlModal({ onClose, onImport, showToast, authConfigs }) {
        const [url, setUrl] = useState('');
        const [status, setStatus] = useState(null);
        const [items, setItems] = useState([]);        // accumulated download list
        const [checked, setChecked] = useState({});    // import candidates
        const [expanded, setExpanded] = useState({});  // expanded cards
        const [selectedAuth, setSelectedAuth] = useState('');
        const [loading, setLoading] = useState(false);

        const authKeys = Object.keys(authConfigs||{});

        const buildFetchHeaders = () => {
          if (!selectedAuth || !authConfigs[selectedAuth]) return {};
          var cfg = authConfigs[selectedAuth];
          var hdrs = {};
          if (cfg.headers) Object.keys(cfg.headers).forEach(function(k){ hdrs[k] = cfg.headers[k]; });
          if (cfg.cookies && Object.keys(cfg.cookies).length > 0) {
            var cookieStr = Object.keys(cfg.cookies).map(function(k){ return k+'='+cfg.cookies[k]; }).join('; ');
            hdrs['Cookie'] = cookieStr;
          }
          return hdrs;
        };

        const filenameFromContentDisposition = (cd) => {
          if (!cd) return null;
          var m = cd.match(/filename\*=(?:UTF-8'')?([^;]+)/i);
          if (m) return decodeURIComponent(m[1].trim().replace(/^["']|["']$/g,''));
          m = cd.match(/filename=["']?([^"';]+)["']?/i);
          if (m) return m[1].trim();
          return null;
        };

        const filenameFromUrl = (u) => {
          try {
            var path = new URL(u).pathname;
            var name = path.split('/').filter(Boolean).pop() || '';
            return name ? decodeURIComponent(name) : null;
          } catch(e) { return null; }
        };

        const buildFileItem = (u, headers) => {
          var cd = headers ? headers.get('content-disposition') : null;
          var cl = headers ? headers.get('content-length') : null;
          var cr = headers ? headers.get('content-range') : null;
          var fileName = filenameFromContentDisposition(cd) || filenameFromUrl(u);
          var fileSize = null;
          if (cr) { var parts=cr.split('/'); var sz=parseInt(parts[parts.length-1],10); if(!isNaN(sz)) fileSize=sz; }
          if (!fileSize && cl) { var sz2=parseInt(cl,10); if(!isNaN(sz2)&&sz2>0) fileSize=sz2; }
          var obj = { id: fileName||('dl_'+Math.random().toString(36).slice(2,6).toUpperCase()), mirrors:[{url:u}] };
          if (fileName) obj.file_name = fileName;
          if (fileSize) obj.file_size = fileSize;
          return obj;
        };

        const fetchFileMeta = (u, proxyPrefix, extraHeaders) => {
          var fetchUrl = proxyPrefix ? proxyPrefix + encodeURIComponent(u) : u;
          var hdrs = extraHeaders || {};
          return fetch(fetchUrl, {method:'HEAD', headers:hdrs})
            .then(function(resp) {
              if (resp.ok || resp.status === 206) return resp;
              // HEAD returned error — fallback to GET with Range: bytes=0-0
              var rangeHdrs = Object.assign({}, hdrs, {Range:'bytes=0-0'});
              return fetch(fetchUrl, {method:'GET', headers:rangeHdrs});
            })
            .then(function(resp) { return buildFileItem(u, resp.headers); });
        };

        const isHuggingFaceUrl = (u) => { try{ return new URL(u).hostname==='huggingface.co'; }catch(e){ return false; } };

        // Convert any HF file URL (blob or resolve) to both variants
        const hfUrlVariants = (u) => {
          var m = u.match(/^(https:\/\/huggingface\.co\/[^/]+\/[^/]+)\/(blob|resolve)\/(.+)$/);
          if (!m) return null;
          return { blob: m[1]+'/blob/'+m[3], resolve: m[1]+'/resolve/'+m[3] };
        };

        // Fetch SHA256 hash from HuggingFace blob page HTML
        const fetchHfSha256 = (blobUrl, proxyPrefix) => {
          var fetchUrl = proxyPrefix ? proxyPrefix + encodeURIComponent(blobUrl) : blobUrl;
          return fetch(fetchUrl)
            .then(function(resp) { if(!resp.ok) throw new Error('blob HTTP '+resp.status); return resp.text(); })
            .then(function(html) {
              var doc = new DOMParser().parseFromString(html, 'text/html');
              // Strategy 1: find <dt>SHA256:</dt> then read sibling <dd>
              var dts = doc.querySelectorAll('dt');
              for (var i=0;i<dts.length;i++) {
                if (dts[i].textContent.trim()==='SHA256:') {
                  var dd=dts[i].nextElementSibling;
                  if (dd) { var h=dd.textContent.trim(); if(h.match(/^[0-9a-f]{64}$/i)) return h; }
                }
              }
              // Strategy 2: any element containing "SHA256" with a 64-char hex string nearby
              var allEls=doc.querySelectorAll('*');
              for (var j=0;j<allEls.length;j++) {
                var txt=allEls[j].textContent||'';
                if (txt.indexOf('SHA256')!==-1) { var mx=txt.match(/\b([0-9a-f]{64})\b/i); if(mx) return mx[1]; }
              }
              return null;
            });
        };

        // ── CivitAI helpers ─────────────────────────────────────────────────────

        // Build canonical download URL from any civitai URL
        const civitaiDownloadUrl = (u) => {
          try {
            var pu = new URL(u);
            if (pu.pathname.includes('/api/download/models/')) return u;
            var m = pu.pathname.match(/\/models\/(\d+)/);
            if (m) {
              var qv = pu.searchParams.get('modelVersionId');
              return 'https://civitai.com/api/download/models/' + (qv || m[1]);
            }
          } catch(e) {}
          return u;
        };

        // Fetch metadata from CivitAI API (via CORS proxy)
        // Handles: /api/download/models/{versionId}, /models/{modelId}[?modelVersionId=…]
        const fetchCivitaiMeta = (u, extraHeaders) => {
          var proxy = 'https://corsproxy.io/?';
          try {
            var pu = new URL(u);
            if (!pu.hostname.includes('civitai.com')) return Promise.reject(new Error('not civitai'));

            const fetchByVersionId = (versionId, wantType, wantFmt) => {
              var apiUrl = 'https://civitai.com/api/v1/model-versions/' + versionId;
              return fetch(proxy + encodeURIComponent(apiUrl), {headers: extraHeaders})
                .then(function(r) { if (!r.ok) throw new Error('API HTTP ' + r.status); return r.json(); })
                .then(function(json) {
                  var files = json.files || [];
                  var file = files[0];
                  if (wantType || wantFmt) {
                    var match = files.find(function(f) {
                      var ft = (f.type||'').toLowerCase();
                      var ff = ((f.metadata&&f.metadata.format)||'').toLowerCase();
                      return (!wantType || ft===wantType || ft.replace(/\s/g,'')===wantType) &&
                             (!wantFmt  || ff===wantFmt);
                    });
                    if (match) file = match;
                  }
                  if (!file) throw new Error('no files in API response');
                  var item = { id: file.name||('civitai_'+versionId), mirrors:[{url:u}] };
                  if (file.name)   item.file_name  = file.name;
                  if (file.sizeKB) item.file_size  = Math.round(file.sizeKB * 1024);
                  if (file.hashes && file.hashes.SHA256) {
                    item.checksum       = file.hashes.SHA256.toLowerCase();
                    item.hash_algorithm = 'sha256';
                  }
                  if (json.model && json.model.name) item.description = json.model.name;
                  return item;
                });
            };

            var wantType = (pu.searchParams.get('type')||'').toLowerCase();
            var wantFmt  = (pu.searchParams.get('format')||'').toLowerCase();

            // Pattern: /api/download/models/{versionId}
            var dlMatch = pu.pathname.match(/\/api\/download\/models\/(\d+)/);
            if (dlMatch) return fetchByVersionId(dlMatch[1], wantType, wantFmt);

            // Pattern: /models/{modelId}[/slug][?modelVersionId=…]
            var pageMatch = pu.pathname.match(/\/models\/(\d+)/);
            if (pageMatch) {
              var qv = pu.searchParams.get('modelVersionId');
              if (qv) return fetchByVersionId(qv, wantType, wantFmt);
              // No versionId — fetch model to get latest version
              var modelApiUrl = 'https://civitai.com/api/v1/models/' + pageMatch[1];
              return fetch(proxy + encodeURIComponent(modelApiUrl), {headers: extraHeaders})
                .then(function(r) { if (!r.ok) throw new Error('Models API HTTP ' + r.status); return r.json(); })
                .then(function(json) {
                  var versions = json.modelVersions || [];
                  if (!versions.length) throw new Error('no versions');
                  return fetchByVersionId(String(versions[0].id), wantType, wantFmt);
                });
            }
            return Promise.reject(new Error('unrecognised civitai URL'));
          } catch(e) { return Promise.reject(e); }
        };

        // Mutate a field on item at index
        const updateItem = (idx, field, value) => {
          setItems(function(prev) {
            var next = prev.map(function(x){ return Object.assign({},x); });
            if (value === '' || value === null || value === undefined) { delete next[idx][field]; }
            else next[idx][field] = value;
            return next;
          });
        };

        const updateMirrorUrl = (idx, mi, value) => {
          setItems(function(prev) {
            var next = deepClone(prev);
            next[idx].mirrors[mi].url = value;
            return next;
          });
        };

        const addMirror = (idx) => {
          setItems(function(prev) {
            var next = deepClone(prev);
            if (!next[idx].mirrors) next[idx].mirrors = [];
            next[idx].mirrors.push({url:''});
            return next;
          });
        };

        const removeMirror = (idx, mi) => {
          setItems(function(prev) {
            var next = deepClone(prev);
            next[idx].mirrors.splice(mi, 1);
            return next;
          });
        };

        const removeItem = (idx) => {
          setItems(function(prev) { return prev.filter(function(_,i){ return i!==idx; }); });
          setChecked(function(prev) {
            // Re-index keys after removal
            var next = {};
            Object.keys(prev).forEach(function(k) {
              var ki = parseInt(k, 10);
              if (ki < idx) next[ki] = prev[k];
              else if (ki > idx) next[ki-1] = prev[k];
            });
            return next;
          });
          setExpanded(function(prev) {
            var next = {};
            Object.keys(prev).forEach(function(k) {
              var ki = parseInt(k, 10);
              if (ki < idx) next[ki] = prev[k];
              else if (ki > idx) next[ki-1] = prev[k];
            });
            return next;
          });
        };

        const toggleExpanded = (idx) => {
          setExpanded(function(prev) { var n=Object.assign({},prev); n[idx]=!n[idx]; return n; });
        };

        const toggleChecked = (idx) => {
          setChecked(function(prev) { var n=Object.assign({},prev); n[idx]=!n[idx]; return n; });
        };

        const toggleAllChecked = () => {
          var allOn = items.every(function(_,i){ return checked[i]; });
          var next = {};
          if (!allOn) items.forEach(function(_,i){ next[i]=true; });
          setChecked(next);
        };

        // Close on ESC
        useEffect(function() {
          function onKeyDown(e) { if (e.key === 'Escape') onClose(); }
          document.addEventListener('keydown', onKeyDown);
          return function() { document.removeEventListener('keydown', onKeyDown); };
        }, [onClose]);

        const doAdd = () => {
          const u = url.trim();
          if (!u) { setStatus({type:'err',msg:'Please enter a URL'}); return; }
          setLoading(true);
          setStatus({type:'loading', msg:'Fetching...'});

          const finishItem = (item) => {
            if (selectedAuth) item.mirrors[0].auth = selectedAuth;
            setItems(function(prev) {
              var newIdx = prev.length;
              // Auto-check and auto-expand the new card
              setChecked(function(c) { var n=Object.assign({},c); n[newIdx]=true; return n; });
              setExpanded(function(e) { var n=Object.assign({},e); n[newIdx]=true; return n; });
              return prev.concat([item]);
            });
            var info = (item.file_name||item.id||'file');
            if (item.file_size) info += ' (' + fmtBytes(item.file_size) + ')';
            if (item.checksum) info += ' | SHA256 ✓';
            setStatus({type:'ok', msg:'Added: ' + info});
            setUrl('');
            setLoading(false);
          };

          const onErr = (e) => {
            setStatus({type:'err', msg:'Error: ' + e.message});
            setLoading(false);
          };

          var proxy = 'https://corsproxy.io/?';
          var extraHeaders = buildFetchHeaders();

          if (isHuggingFaceUrl(u)) {
            var variants = hfUrlVariants(u);
            if (variants) {
              setStatus({type:'loading', msg:'HuggingFace: fetching SHA256 + metadata...'});
              var sha256P = fetchHfSha256(variants.blob, proxy).catch(function(){ return null; });
              var metaP = fetchFileMeta(variants.resolve, proxy, extraHeaders)
                .catch(function(){ return buildFileItem(variants.resolve, null); });
              Promise.all([sha256P, metaP]).then(function(res) {
                var item = res[1];
                item.mirrors = [{url: variants.resolve}];
                if (res[0]) { item.checksum = res[0]; item.hash_algorithm = 'sha256'; }
                finishItem(item);
              }).catch(onErr);
              return;
            }
          }

          // CivitAI: API first, then GET-Range via proxy following 307→CDN
          if (u.includes('civitai.com')) {
            setStatus({type:'loading', msg:'CivitAI: resolving metadata via API...'});
            fetchCivitaiMeta(u, extraHeaders)
              .then(finishItem)
              .catch(function() {
                setStatus({type:'loading', msg:'CivitAI API failed, trying download redirect...'});
                var dlUrl = civitaiDownloadUrl(u);
                fetch(proxy + encodeURIComponent(dlUrl), {method:'GET', headers:Object.assign({},extraHeaders,{Range:'bytes=0-0'}), redirect:'follow'})
                  .then(function(r) {
                    var item = buildFileItem(u, r.headers);
                    item.mirrors = [{url:u}];
                    finishItem(item);
                  })
                  .catch(function() {
                    setStatus({type:'ok', msg:'Added (metadata unavailable — please fill in manually)'});
                    var name = filenameFromUrl(u) || ('dl_'+Math.random().toString(36).slice(2,6).toUpperCase());
                    finishItem({id:name, file_name:name, mirrors:[{url:u}]});
                  });
              });
            return;
          }

          // Generic file: direct HEAD, fallback to CORS proxy
          fetch(u, {method:'HEAD', headers:extraHeaders})
            .then(function(resp) {
              finishItem(buildFileItem(u, resp.headers));
            })
            .catch(function() {
              setStatus({type:'loading', msg:'CORS blocked, retrying via proxy...'});
              return fetchFileMeta(u, proxy, extraHeaders)
                .then(finishItem)
                .catch(onErr);
            });
        };

        var checkedIndices = Object.keys(checked).filter(function(k){ return checked[k]; }).map(Number);

        const doImport = () => {
          if (!checkedIndices.length) { showToast('No items selected', false); return; }
          var selected = checkedIndices.sort(function(a,b){return a-b;}).map(function(i){ return deepClone(items[i]); });
          onImport(selected);
          onClose();
          showToast('Imported ' + selected.length + ' download(s)');
        };

        return (
          <div className="modal-backdrop show">
            <div className="import-url-modal" style={{maxWidth:1100,width:'98vw',maxHeight:'92vh'}}>
              <div className="modal-head"><span>Import Downloads from URL</span><button className="btn ghost sm" onClick={onClose}>✕</button></div>
              <div className="import-url-body" style={{overflowY:'auto',flex:1}}>

                {/* URL input */}
                <div className="field">
                  <label>URL <span style={{color:'var(--text-3)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— direct file link or HuggingFace</span></label>
                  <div style={{display:'flex',gap:8}}>
                    <input value={url} onChange={function(e){setUrl(e.target.value);}} placeholder="https://huggingface.co/… or direct download link"
                      style={{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'8px 10px',fontFamily:'var(--font-mono)',fontSize:'12.5px',color:'var(--text)',outline:'none'}}
                      onKeyDown={function(e){if(e.key==='Enter')doAdd();}}
                    />
                    <button className="btn primary sm" onClick={doAdd} disabled={loading || !url.trim()}>+ Add</button>
                  </div>
                </div>

                {/* Auth config selector */}
                <div className="field">
                  <label>Auth Config <span style={{color:'var(--text-3)',fontWeight:400,textTransform:'none',letterSpacing:0}}>optional — sends headers/cookies with request</span></label>
                  <select value={selectedAuth} onChange={function(e){setSelectedAuth(e.target.value);}}
                    style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'8px 10px',fontFamily:'var(--font-mono)',fontSize:'12.5px',color:selectedAuth?'var(--orange)':'var(--text-3)',outline:'none',width:'100%',appearance:'none'}}>
                    <option value="">— None —</option>
                    {authKeys.map(function(k){
                      var cfg=authConfigs[k];
                      var hc=cfg.headers?Object.keys(cfg.headers).length:0;
                      var cc=cfg.cookies?Object.keys(cfg.cookies).length:0;
                      var hint=[]; if(hc) hint.push(hc+' header'+(hc>1?'s':'')); if(cc) hint.push(cc+' cookie'+(cc>1?'s':''));
                      return <option key={k} value={k}>{k}{hint.length?' ('+hint.join(', ')+')':''}</option>;
                    })}
                  </select>
                  {!authKeys.length && <div style={{fontSize:11,color:'var(--text-3)',marginTop:3}}>No auth configs defined — add them in the Auth Configs section</div>}
                </div>

                {/* Status message */}
                {status && (
                  <div className={'import-url-status'+(status.type==='ok'?' ok':status.type==='err'?' err':'')}>
                    {status.type==='loading'&&<span style={{opacity:.6}}>⏳ </span>}{status.msg}
                  </div>
                )}

                {/* Accumulated download cards */}
                {items.length > 0 && (
                  <div>
                    <div className="tg-header" style={{margin:'4px 0 6px'}}>
                      <span>Downloads to import ({items.length})</span>
                      <button className="tg-select-all" onClick={toggleAllChecked}>
                        {items.every(function(_,i){return checked[i];}) ? 'Deselect all' : 'Select all'}
                      </button>
                      <button className="tg-select-all" style={{color:'var(--red)',marginLeft:8}} onClick={function(){setItems([]);setChecked({});setExpanded({});}}>Clear all</button>
                    </div>
                    <div>
                      {items.map(function(item, idx){ return (
                        <div key={idx} className="iurl-card" style={{opacity:checked[idx]?1:0.45,transition:'opacity .15s'}}>
                          {/* Card header: checkbox + name + badges + expand toggle + remove */}
                          <div className="iurl-card-head">
                            <input type="checkbox" checked={!!checked[idx]} onChange={function(e){e.stopPropagation();toggleChecked(idx);}}
                              style={{accentColor:'var(--accent)',width:13,height:13,flexShrink:0,cursor:'pointer'}} />
                            <span className="iurl-card-fname" onClick={function(){toggleExpanded(idx);}} style={{cursor:'pointer'}}>{item.file_name||item.id||'unnamed'}</span>
                            {item.file_size&&<span style={{fontSize:10.5,color:'var(--text-3)',fontFamily:'var(--font-mono)',flexShrink:0}}>{fmtBytes(item.file_size)}</span>}
                            {item.checksum&&<span className="badge green" style={{flexShrink:0}}>{(item.hash_algorithm||'sha256').toUpperCase()}</span>}
                            {item.mirrors&&item.mirrors[0]&&item.mirrors[0].auth&&<span className="badge orange" style={{flexShrink:0}}>{item.mirrors[0].auth}</span>}
                            <span style={{fontSize:9,color:'var(--text-3)',cursor:'pointer'}} onClick={function(){toggleExpanded(idx);}}>{expanded[idx]?'▲':'▼'}</span>
                            <button className="btn danger sm" style={{padding:'2px 6px',fontSize:11}} onClick={function(e){e.stopPropagation();removeItem(idx);}}>✕</button>
                          </div>

                          {/* Collapsible edit body */}
                          <div className={'collapsible-wrapper'+(expanded[idx]?' open':'')}>
                            <div className="collapsible-inner">
                              <div className="iurl-card-body">
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                                  <div className="iurl-field">
                                    <label>ID *</label>
                                    <input defaultValue={item.id||''} key={'id-'+idx+'-'+item.id} onBlur={function(e){updateItem(idx,'id',e.target.value||item.id);}} />
                                  </div>
                                  <div className="iurl-field">
                                    <label>File Name</label>
                                    <input defaultValue={item.file_name||''} key={'fn-'+idx} onBlur={function(e){updateItem(idx,'file_name',e.target.value);}} />
                                  </div>
                                </div>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                                  <div className="iurl-field">
                                    <label>Folder Path</label>
                                    <input defaultValue={item.folder_path||''} key={'fp-'+idx} placeholder="/workspace/ComfyUI/models/" onBlur={function(e){updateItem(idx,'folder_path',e.target.value);}} />
                                  </div>
                                  <div className="iurl-field">
                                    <label>File Size (bytes)</label>
                                    <input type="number" defaultValue={item.file_size||''} key={'fs-'+idx} onBlur={function(e){updateItem(idx,'file_size',e.target.value?+e.target.value:null);}} />
                                  </div>
                                </div>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:8}}>
                                  <div className="iurl-field">
                                    <label>Hash Algo</label>
                                    <select value={item.hash_algorithm||''} onChange={function(e){updateItem(idx,'hash_algorithm',e.target.value||null);}}
                                      style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'5px 8px',fontFamily:'var(--font-mono)',fontSize:11.5,color:'var(--text)',outline:'none',width:'100%',appearance:'none'}}>
                                      <option value="">— None —</option>
                                      <option value="sha256">sha256</option>
                                      <option value="sha1">sha1</option>
                                      <option value="md5">md5</option>
                                    </select>
                                  </div>
                                  <div className="iurl-field">
                                    <label>Checksum</label>
                                    <input defaultValue={item.checksum||''} key={'cs-'+idx+'-'+(item.checksum||'')} placeholder="hash value" onBlur={function(e){updateItem(idx,'checksum',e.target.value);}} style={{fontFamily:'var(--font-mono)',fontSize:10.5}} />
                                  </div>
                                </div>
                                <div className="iurl-field">
                                  <label>Description <span style={{fontWeight:400,textTransform:'none',letterSpacing:0,color:'var(--text-3)',fontSize:10}}>(optional)</span></label>
                                  <input defaultValue={item.description||''} key={'desc-'+idx+'-'+(item.description||'')} placeholder="short description" onBlur={function(e){updateItem(idx,'description',e.target.value);}} />
                                </div>
                                {/* Mirror URLs */}
                                <div>
                                  <div style={{fontSize:10,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>Mirrors</div>
                                  {(item.mirrors||[]).map(function(mir, mi){ return (
                                    <div key={mi} className="iurl-mirror-row" style={{marginBottom:4}}>
                                      <input value={mir.url||''} onChange={function(e){updateMirrorUrl(idx,mi,e.target.value);}}
                                        style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'4px 7px',fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text)',outline:'none',width:'100%'}} />
                                      <button className="btn danger sm" style={{padding:'3px 7px'}} onClick={function(){removeMirror(idx,mi);}}>✕</button>
                                    </div>
                                  );})}
                                  <button className="btn add sm" style={{marginTop:2}} onClick={function(){addMirror(idx);}}>+ Mirror</button>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      );})}
                    </div>
                  </div>
                )}
              </div>

              <div className="import-url-footer">
                <span className="sel-info">{items.length > 0 ? checkedIndices.length + ' of ' + items.length + ' selected' : 'Add URLs above'}</span>
                <button className="btn ghost sm" onClick={onClose}>Cancel</button>
                <button className="btn primary sm" onClick={doImport} disabled={checkedIndices.length===0}>
                  ⬇ Import {checkedIndices.length > 0 ? checkedIndices.length + ' item(s)' : ''}
                </button>
              </div>
            </div>
          </div>
        );
      }

      function getAllPresetPaths(arr, path, result) {
        if(!result) result=[];
        for(let i=0;i<arr.length;i++){ const np=path.concat([i]); result.push({path:np,node:arr[i]}); if(arr[i].presets&&arr[i].presets.length) getAllPresetPaths(arr[i].presets,np.concat(['presets']),result); }
        return result;
      }

      function TransferModal({ data, type, srcPath, updateData, showToast, onClose }) {
        const [targetPath, setTargetPath] = useState(null);
        const [checked, setChecked] = useState({});
        const typeLabels={presets:'Presets',downloads:'Downloads',download_ids:'Download IDs',preset_ids:'Preset IDs'};
        let srcNode; try{srcNode=getNodeFromData(data,srcPath);}catch(e){return null;}
        const allPresets=getAllPresetPaths(data.presets||[],['presets']); const srcStr=pstr(srcPath);
        const items=type==='presets'?(srcNode.presets||[]):type==='downloads'?(srcNode.downloads||[]):type==='download_ids'?(srcNode.download_ids||[]):(srcNode.preset_ids||[]);
        const getLabel=item=>{ if(type==='presets')return item.name||item.id||'Unnamed'; if(type==='downloads')return item.file_name||item.id||'unnamed'; return item; };
        const toggleAll=()=>{ const allChecked=items.every((_,i)=>checked[i]); const next={}; if(!allChecked)items.forEach((_,i)=>next[i]=true); setChecked(next); };
        const checkedIndices=Object.keys(checked).filter(k=>checked[k]).map(Number).sort((a,b)=>a-b);
        const doTransfer=isMove=>{ if(!targetPath){showToast('Select a target preset',false);return;} if(!checkedIndices.length){showToast('Select items',false);return;} updateData(d=>{ const src=getNodeFromData(d,srcPath); const tgt=getNodeFromData(d,targetPath); const srcArr=type==='presets'?src.presets:type==='downloads'?src.downloads:type==='download_ids'?src.download_ids:src.preset_ids; const tgtKey=type==='presets'?'presets':type==='downloads'?'downloads':type==='download_ids'?'download_ids':'preset_ids'; if(!tgt[tgtKey])tgt[tgtKey]=[]; const copies=checkedIndices.map(i=>deepClone(srcArr[i])); copies.forEach(item=>tgt[tgtKey].push(item)); if(isMove){for(let i=checkedIndices.length-1;i>=0;i--)srcArr.splice(checkedIndices[i],1);} }); onClose(); showToast((isMove?'Moved':'Copied')+' '+checkedIndices.length+' item(s) ✓'); };
        return (
          <div className="modal-backdrop show" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
            <div className="transfer-modal">
              <div className="modal-head"><span>Transfer: {typeLabels[type]||type}</span><button className="btn ghost sm" onClick={onClose}>✕</button></div>
              <div className="transfer-section"><h3>Target Preset</h3>
                <div className="transfer-preset-list">
                  {allPresets.filter(p=>{ if(pstr(p.path)===srcStr)return false; if(pstr(p.path).startsWith(srcStr.slice(0,-1)))return false; return true; }).map((p,i)=>{ const depth=Math.floor(p.path.length/2)-1; return <div key={i} className={`tpt-item${pstr(targetPath)===pstr(p.path)?' selected':''}`} onClick={()=>setTargetPath(p.path)}>{depth>0&&<span style={{color:'var(--text-3)',marginRight:4}}>{'  '.repeat(depth)}↳</span>}<span style={{flex:1}}>{p.node.name||p.node.id||'Unnamed'}</span><span style={{fontSize:10.5,color:'var(--text-3)',fontFamily:'var(--font-mono)'}}>{p.node.id||''}</span></div>; })}
                </div>
              </div>
              <div className="transfer-items-area"><h3>Select Items</h3>
                {items.length>0&&<><div className="tg-header"><span>{typeLabels[type]}</span><button className="tg-select-all" onClick={toggleAll}>Select all</button></div>{items.map((item,i)=><div key={i} className="ti-row"><input type="checkbox" checked={!!checked[i]} onChange={e=>setChecked(prev=>({...prev,[i]:e.target.checked}))} /><span className="ti-label">{getLabel(item)}</span><span className="ti-type">{type.replace('_',' ')}</span></div>)}</>}
                {!items.length&&<div style={{color:'var(--text-3)',fontSize:12.5}}>No items</div>}
              </div>
              <div className="transfer-footer">
                <span className="sel-info">Selected: {checkedIndices.length} of {items.length}{targetPath?' → '+(()=>{try{const n=getNodeFromData(data,targetPath);return n.name||n.id||'?';}catch(e){return'?';}})():' (choose a target)'}</span>
                <button className="btn ghost sm" onClick={onClose}>Cancel</button>
                <button className="btn primary sm" onClick={()=>doTransfer(false)}>⎘ Copy</button>
                <button className="btn orange sm" onClick={()=>doTransfer(true)}>→ Move</button>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
